<!-- Amby Luxe Jewels – Reset password -->
<!-- Paste into: Supabase Dashboard → Authentication → Email Templates → Reset Password -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset your password</title>
</head>
<body style="margin:0; padding:0; background-color:#0a0c10; font-family: 'Segoe UI', system-ui, sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#0a0c10; padding: 40px 20px;">
    <tr>
      <td align="center">
        <table width="100%" style="max-width: 480px; background: #12151c; border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 4px;">
          <tr>
            <td style="padding: 48px 40px;">
              <p style="margin:0 0 24px 0; font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: #d4af37;">Amby Luxe Jewels</p>
              <h1 style="margin:0 0 8px 0; font-size: 28px; font-weight: 300; color: #f5f0e6; font-family: Georgia, serif;">Reset password</h1>
              <p style="margin:0 0 32px 0; font-size: 14px; color: #9ca3af; line-height: 1.6;">Click below to set a new password.</p>
              <a href="{{ .ConfirmationURL }}" style="display: inline-block; padding: 14px 32px; background-color: #d4af37; color: #0a0c10; font-size: 12px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; text-decoration: none; border-radius: 2px;">Reset password</a>
              <p style="margin: 32px 0 0 0; font-size: 11px; color: #6b7280;">If you didn’t request this, you can ignore this email.</p>
              <p style="margin: 24px 0 0 0; font-size: 10px; color: #4b5563;">Amby Luxe Jewels</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
